name: Build Releases

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux

          - os: macos-latest
            artifact: macos

          - os: windows-latest
            artifact: windows

    runs-on: ${{ matrix.os }}

    env:
      APP_NAME: game

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install D
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      ##########################################################
      # BUILD
      ##########################################################

      - name: Build
        run: |
          dub build --compiler=ldc2

      ##########################################################
      # WINDOWS
      ##########################################################

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist

          Copy-Item "$env:APP_NAME.exe" dist/

          if (Test-Path assets) {
            Copy-Item assets dist/assets -Recurse
          }

      - name: Upload Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist

      ##########################################################
      # LINUX APPIMAGE
      ##########################################################

      - name: Install AppImage tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update

          wget -q \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage

          chmod +x appimagetool-x86_64.AppImage

      - name: Create AppDir
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir/usr/bin

          cp ${APP_NAME} AppDir/usr/bin/

          cp packaging/linux/AppRun AppDir/
          cp packaging/linux/${APP_NAME}.desktop AppDir/
          cp packaging/linux/${APP_NAME}.png AppDir/

          chmod +x AppDir/AppRun

          if [ -d assets ]; then
            cp -r assets AppDir/
          fi

      - name: Build AppImage
        if: runner.os == 'Linux'
        run: |
          ./appimagetool-x86_64.AppImage AppDir ${APP_NAME}.AppImage

      - name: Upload AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"

      ##########################################################
      # MACOS DMG
      ##########################################################

      - name: Create App Bundle
        if: runner.os == 'macOS'
        run: |
          mkdir -p ${APP_NAME}.app/Contents/MacOS
          mkdir -p ${APP_NAME}.app/Contents/Resources

          cp ${APP_NAME} \
            ${APP_NAME}.app/Contents/MacOS/

          cp packaging/macos/Info.plist \
            ${APP_NAME}.app/Contents/

          cp packaging/macos/icon.icns \
            ${APP_NAME}.app/Contents/Resources/

          if [ -d assets ]; then
            cp -R assets \
              ${APP_NAME}.app/Contents/Resources/
          fi

      - name: Create DMG
        if: runner.os == 'macOS'
        run: |
          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "${APP_NAME}.app" \
            -ov \
            -format UDZO \
            "${APP_NAME}.dmg"

      - name: Upload DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"
